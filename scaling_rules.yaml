# MAVLink Scaling Rules & Custom Units
# Format: MSG_TYPE -> Field -> { factor: X, unit: "Y" }

GLOBAL_POSITION_INT:
  lat: { factor: 10000000.0, unit: "deg" }
  lon: { factor: 10000000.0, unit: "deg" }
  alt: { factor: 1000.0, unit: "m" }
  relative_alt: { factor: 1000.0, unit: "m" }
  vx: { factor: 100.0, unit: "m/s" }
  vy: { factor: 100.0, unit: "m/s" }
  vz: { factor: 100.0, unit: "m/s" }
  hdg: { factor: 100.0, unit: "deg" }

GPS_RAW_INT:
  lat: { factor: 10000000.0, unit: "deg" }
  lon: { factor: 10000000.0, unit: "deg" }
  alt: { factor: 1000.0, unit: "m" }
  vel: { factor: 100.0, unit: "m/s" }
  cog: { factor: 100.0, unit: "deg" }

SYS_STATUS:
  voltage_battery: { factor: 1000.0, unit: "V" }
  current_battery: { factor: 100.0, unit: "A" }
  load: { factor: 10.0, unit: "%" }

BATTERY_STATUS:
  voltages: { factor: 1000.0, unit: "V" }
  current_battery: { factor: 100.0, unit: "A" }
  temperature: { factor: 100.0, unit: "C" }
  voltages_ext: { factor: 1000.0, unit: "V" }

POWER_STATUS:
  vcc: { factor: 1000.0, unit: "V" }
  vservo: { factor: 1000.0, unit: "V" }

RAW_IMU:
  xacc: { factor: 1000.0, unit: "m/s^2" }
  yacc: { factor: 1000.0, unit: "m/s^2" }
  zacc: { factor: 1000.0, unit: "m/s^2" }
  xgyro: { factor: 1000.0, unit: "rad/s" }
  ygyro: { factor: 1000.0, unit: "rad/s" }
  zgyro: { factor: 1000.0, unit: "rad/s" }

MCU_STATUS:
  MCU_voltage: { factor: 1000.0, unit: "V" }
  MCU_temperature: { factor: 100.0, unit: "C" }